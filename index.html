<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ziva</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify detection -->
    <form name="orders" data-netlify="true" hidden>
      <input type="text" name="customerName" />
      <input type="email" name="customerEmail" />
      <input type="text" name="contact" />
      <input type="text" name="address" />
      <input type="text" name="city" />
      <input type="text" name="items" />
      <input type="text" name="total" />
      <input type="text" name="paymentMethod" />
      <input type="text" name="orderDate" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }

      // Automatically open the identity widget if a token is present in the URL (for invitations/confirmations)
      window.addEventListener("load", () => {
        if (window.location.hash.includes("invite_token") || 
            window.location.hash.includes("confirmation_token") || 
            window.location.hash.includes("recovery_token")) {
          if (window.netlifyIdentity) {
            window.netlifyIdentity.open();
          }
        }
      });
    </script>
  </body>
</html>
