<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ziva</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify detection -->
    <form name="orders" data-netlify="true" hidden>
      <input type="text" name="customerName" />
      <input type="email" name="customerEmail" />
      <input type="text" name="contact" />
      <input type="text" name="address" />
      <input type="text" name="city" />
      <input type="text" name="items" />
      <input type="text" name="total" />
      <input type="text" name="paymentMethod" />
      <input type="text" name="orderDate" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Configuration for Netlify Identity in the preview environment
      const NETLIFY_SITE_URL = "https://zivaclothing.netlify.app"; // Update this to your actual netlify domain

      if (window.netlifyIdentity) {
        // Initialize with the production API server if we're on a preview domain
        const isPreview = window.location.hostname.includes("run.app") || window.location.hostname.includes("localhost");
        
        if (isPreview) {
          window.netlifyIdentity.init({
            API_SERVER: `${NETLIFY_SITE_URL}/.netlify/identity`
          });
        }

        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }

      // Automatically open the identity widget if a token is present in the URL
      window.addEventListener("load", () => {
        const hash = window.location.hash;
        if (hash.includes("invite_token") || 
            hash.includes("confirmation_token") || 
            hash.includes("recovery_token")) {
          
          if (window.netlifyIdentity) {
            // Re-initialize for tokens to ensure they hit the right backend
            const isPreview = window.location.hostname.includes("run.app") || window.location.hostname.includes("localhost");
            if (isPreview) {
              window.netlifyIdentity.init({
                API_SERVER: `${NETLIFY_SITE_URL}/.netlify/identity`
              });
            }
            window.netlifyIdentity.open();
          }
        }
      });
    </script>
  </body>
</html>
